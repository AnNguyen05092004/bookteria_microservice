server:
    port: 8888

app:
  api-prefix: /api

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity_service
              uri: http://localhost:8080
              predicates:
                - Path=${app.api-prefix}/identity/**
              filters:
                - StripPrefix=1 # Loại bỏ 1 /, vd phần /api khỏi đường dẫn khi chuyển tiếp đến identity-service
            - id: profile_service
              uri: http://localhost:8081
              predicates:
                - Path=${app.api-prefix}/profile/users/** # những endpoint có /internal/user... sẽ không map, ko truy cập được
              filters:
                - StripPrefix=1 # Loại bỏ 1 /, phần /api khỏi đường dẫn khi chuyển tiếp đến profile-service
            - id: notification_service
              uri: http://localhost:8082
              predicates:
                - Path=${app.api-prefix}/notification/**
              filters:
                - StripPrefix=1
            - id: post_service
              uri: http://localhost:8083
              predicates:
                - Path=${app.api-prefix}/post/**
              filters:
                - StripPrefix=1
            - id: file_service
              uri: http://localhost:8084
              predicates:
                - Path=${app.api-prefix}/file/**
              filters:
                - StripPrefix=1
            - id: chat_service
              uri: http://localhost:8085
              predicates:
                - Path=${app.api-prefix}/chat/**
              filters:
                - StripPrefix=1



